{% extends 'base.html' %}
{% block title %}Cities List{% endblock %}

{% block content %}
<h1> Cities List</h1>
<div class="row">
    <div class="col-md">
        {% for object in objects_list %}
            <p>
                <a href="{% url 'cities:detail' id=object.id %}">{{object.name}}</a>
            </p>
        {% endfor %}
    </div>
</div>

<div class="row">
    <div class="col-md4">
        <form action="" method="post"> {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Submit">
        </form>
    </div>
</div>

{% endblock %}
